<style>
  :root{
    --background:#0a0a0a;
    --foreground:#f5f0e8;
    --primary:#1a0533;
    --primary-foreground:#f5f0e8;
    --cta:#9b59b6;
    --cta-bright:#c39bd3;
    --success:#22a06b;
    --success-foreground:#ffffff;
    --accent:#d4a8f0;
    --border:#2d1b4e;
  }
  *{box-sizing:border-box;margin:0;padding:0;border:0 solid var(--border)}
  html,body{background:var(--background);color:var(--foreground);-webkit-font-smoothing:antialiased;font-family:Georgia,serif;line-height:1.5}
  h1,h2,h3{font-family:Georgia,serif;letter-spacing:-.01em}

  /* Progress bar */
  .progress{background:var(--primary);color:var(--primary-foreground);border-bottom:3px solid var(--cta)}
  .progress-inner{max-width:1024px;margin:0 auto;padding:20px 16px}
  .steps{list-style:none;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .step{flex:1;display:flex;align-items:center;gap:8px}
  .step-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center}
  .circle{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;border:2px solid rgba(245,240,232,.3);background:var(--primary);color:rgba(245,240,232,.6);transition:.2s;font-family:Georgia,serif}
  .circle.done{border-color:var(--success);background:var(--success);color:#fff}
  .circle.active{border-color:var(--accent);background:var(--cta);color:#fff;box-shadow:0 0 0 4px rgba(155,89,182,.4)}
  .step-label{display:none;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:rgba(245,240,232,.7);font-family:Inter,sans-serif}
  .step-label.active{color:var(--accent)}
  @media(min-width:640px){.step-label{display:block}}
  .bar{height:4px;flex:1;border-radius:9999px;background:rgba(245,240,232,.15)}
  .bar.done{background:var(--success)}
  .substep{margin-top:12px;text-align:center;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--accent);font-family:Inter,sans-serif}

  /* Alert — roxo forte, bem diferente */
  .alert{background:var(--cta);color:#fff}
  .alert-inner{max-width:1024px;margin:0 auto;padding:16px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
  @media(min-width:640px){.alert-inner{flex-direction:row;justify-content:center;gap:14px}}
  .alert p{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-family:Inter,sans-serif}
  @media(min-width:640px){.alert p{font-size:17px}}
  .star{font-size:22px;animation:starshine 1.5s ease-in-out infinite alternate}
  @keyframes starshine{from{transform:scale(1) rotate(0deg)}to{transform:scale(1.3) rotate(20deg)}}

  /* Divider highlight abaixo do alert */
  .highlight-bar{height:5px;background:linear-gradient(90deg,#6c3483,#9b59b6,#d4a8f0,#9b59b6,#6c3483)}

  /* Heading — grande, claro, fundo escuro */
  .heading{max-width:672px;margin:0 auto;padding:36px 20px 0;text-align:center}
  .heading h1{font-size:26px;color:var(--foreground);line-height:1.35}
  @media(min-width:640px){.heading h1{font-size:34px}}

  /* Video */
  .video-section{background:var(--background)}
  .video-wrap{max-width:672px;margin:0 auto;padding:28px 16px 40px;width:100%}
  vturb-smartplayer{display:block;margin:0 auto;width:100%}
</style>

<body>

<header class="progress">
  <div class="progress-inner">
    <ol class="steps" id="steps"></ol>
    <p class="substep">Etapa <span id="substep">2</span> de 3 — completa todas para liberar tu acceso</p>
  </div>
</header>

<div class="alert">
  <div class="alert-inner">
    <span class="star" aria-hidden="true">🌟</span>
    <p>¡ESPERA! Mira el video de abajo para completar tu pedido.</p>
    <span class="star" aria-hidden="true">🌟</span>
  </div>
</div>
<div class="highlight-bar"></div>

<div class="heading">
  <h1>Antes de continuar, mira esto…</h1>
</div>

<main class="video-section">
  <div class="video-wrap">
    <vturb-smartplayer id="vid-6a403f52d846aeb492a2414f" style="display: block; margin: 0 auto; width: 100%; max-width: 400px;"><div class="vturb-player-placeholder" style="position: relative; width: 100%; padding: 177.77777777777777% 0 0; z-index: 0; background-color: black;"></div></vturb-smartplayer>
  </div>
</main>

<script>
  (function(){
    var labels=["Pedido","Pago","Etapas Exclusivas","Acceso al Producto"];
    var current=2;
    var ol=document.getElementById("steps");
    labels.forEach(function(label,i){
      var done=i<current, active=i===current;
      var li=document.createElement("li"); li.className="step";
      var wrap=document.createElement("div"); wrap.className="step-wrap";
      var c=document.createElement("div"); c.className="circle"+(done?" done":active?" active":"");
      c.textContent=done?"✓":(i+1);
      var s=document.createElement("span"); s.className="step-label"+(active?" active":""); s.textContent=label;
      wrap.appendChild(c); wrap.appendChild(s); li.appendChild(wrap);
      if(i<labels.length-1){var b=document.createElement("div"); b.className="bar"+(i<current?" done":""); li.appendChild(b);}
      ol.appendChild(li);
    });
    var p=new URLSearchParams(location.search).get("step");
    if(p && +p>=1 && +p<=3) document.getElementById("substep").textContent=p;
    else document.getElementById("substep").textContent="2";
  })();

  (function(){
    var s=document.createElement("script");
    s.src="https://scripts.converteai.net/7072387c-52c8-4326-b9b6-2e5995c221ad/players/6a403f52d846aeb492a2414f/v4/player.js";
    s.async=true;
    document.head.appendChild(s);
  })();
</script>
